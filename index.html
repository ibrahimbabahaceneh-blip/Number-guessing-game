<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Number Guessing Game</h1>
        <h3>(1-100)</h3>
    </header>
    <main>
    <div id="bigbox">
        <div id="titre" class="containers">
            <label for="guess">Your Guess :</label>
        </div>
        <div id="guessBox" class="containers">
            <input type="number" id="guess">
        </div>
        <div id="Submitbox" class="containers">
            <button id="Submitbtn">Sumbit</button>
        </div>
        <div id="resultbox" class="containers">
            <h3 id="result">we're waiting</h3>
        </div>
        <div id="hintbox" class="containers">
            <h3 id="hint">we're waiting</h3>
        </div>
        <div id="countBox" class="containers">
            <h3 id="count">You tried : 0 times</h3>
        </div>
    </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
